<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omeka Image Extractor</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .controls { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-fetch { background: #2563eb; color: white; }
        .btn-copy { background: #16a34a; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #1e293b; padding: 5px; border-radius: 4px; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 2px; }
        #log { margin-top: 10px; color: #94a3b8; font-size: 14px; }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

<div class="container">
    <h1>📸 Omeka Image Extractor</h1>
    <div class="controls">
        <input type="text" id="apiUrl" value="https://psig.huma-num.fr/omeka-s/api/media">
        <button class="btn-fetch" onclick="fetchImages()">Extraire les images</button>
        <button class="btn-copy" onclick="copyLinks()">Copier les liens</button>
    </div>
    <div id="log">Prêt.</div>
    <div class="grid" id="gallery"></div>
</div>

<script>
    let currentLinks = [];

    async function fetchImages() {
        const url = document.getElementById('apiUrl').value;
        const log = document.getElementById('log');
        const gallery = document.getElementById('gallery');
        
        gallery.innerHTML = '';
        log.innerText = "Récupération des données...";

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // Omeka S structure extraction
            currentLinks = data.map(item => item['o:original_url']).filter(u => u);
            
            log.innerText = `Succès ! ${currentLinks.length} images trouvées.`;
            
            currentLinks.forEach(link => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${link}" loading="lazy">`;
                gallery.appendChild(div);
            });
        } catch (e) {
            log.innerText = "Erreur : " + e.message;
        }
    }

    function copyLinks() {
        if (currentLinks.length === 0) return alert("Rien à copier !");
        navigator.clipboard.writeText(currentLinks.join('\n'));
        alert("Liens copiés dans le presse-papier !");
    }
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
